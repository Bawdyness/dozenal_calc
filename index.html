<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>Dozenal Calc</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link data-trunk rel="rust" href="Cargo.toml" />
        
        <style>
          html, body { 
              height: 100dvh; /* Nutzt die dynamische Höhe */
              width: 100vw;
              margin: 0; 
              padding: 0; 
              overflow: hidden; /* Verhindert Scrollen */
              background-color: #1a1a1a; 
              position: fixed; /* Fixiert den Viewport gegen "Hüpfen" */
              touch-action: none; /* Verhindert Standard-Gesten wie Pull-to-refresh */
          }
          canvas { 
              width: 100%; 
              height: 100%; 
              display: block;
          }
      </style>
        <script>
          // Prevent browser defaults (back-navigation, quick-find, scrolling) for keys
          // used by the calculator. Checked by symbol (e.key), not physical key code,
          // so layout-independent: "/" matches Shift+7 on Swiss keyboards etc.
          document.addEventListener('keydown', function(e) {
            var used = ['Backspace', 'Enter', 'Escape',
                        'ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', '/'];
            if (used.includes(e.key)) e.preventDefault();
          }, true);
        </script>
    </head>
    <body>
        <canvas id="the_canvas_id"></canvas>
    </body>
</html>
