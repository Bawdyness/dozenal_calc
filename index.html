<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>Dozenal Calc</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
        <link data-trunk rel="rust" href="Cargo.toml" />

        <style>
          html, body {
              margin: 0;
              padding: 0;
              background-color: #1a1a1a;
              /* Pull-to-refresh und horizontales Bouncen unterbinden, vertikales
                 Scrollen aber erlauben — falls der Viewport (z.B. mit eingeblendeter
                 URL-Leiste) zu kurz für das gesamte Keypad ist. */
              overscroll-behavior: contain;
          }
          body {
              /* Safe-Area unten respektieren (Notch, Home-Indikator) */
              padding-bottom: env(safe-area-inset-bottom, 0);
          }
          canvas {
              display: block;
              width: 100%;
              /* Auf hohen Viewports füllt der Canvas den Bildschirm. Ist der
                 Viewport kürzer als 700 px, behält der Canvas seine Mindesthöhe
                 und der Body wird vertikal scrollbar — dadurch bleibt die
                 Gleich-Taste in jedem Fall erreichbar. */
              min-height: 700px;
              height: 100vh;
              height: 100svh;
          }
      </style>
        <script>
          // Prevent browser defaults (back-navigation, quick-find, scrolling) for keys
          // used by the calculator. Checked by symbol (e.key), not physical key code,
          // so layout-independent: "/" matches Shift+7 on Swiss keyboards etc.
          document.addEventListener('keydown', function(e) {
            var used = ['Backspace', 'Enter', 'Escape',
                        'ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', '/'];
            if (used.includes(e.key)) e.preventDefault();
          }, true);
        </script>
    </head>
    <body>
        <canvas id="the_canvas_id"></canvas>
    </body>
</html>
