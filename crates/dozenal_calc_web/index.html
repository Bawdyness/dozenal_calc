<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8" />
    <title>Dozenal Calc</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1a1a" />
    <meta name="description" content="Wissenschafts-Taschenrechner mit nativer Basis-12-Arithmetik und eigenen Ziffer-Glyphen." />
    <link data-trunk rel="rust" href="Cargo.toml" />
    <style>
        :root {
            /* Design-Tokens aus research/design_tokens.md */
            --bg: #1f1f1f;
            --bg-display: rgba(0, 0, 0, 0.45);
            --bg-elev: rgba(255, 255, 255, 0.04);
            --fg: #e6e6e6;
            --fg-dim: #888;
            --fg-faint: #555;
            --accent: #98c8ff;
            --equals: #8cdc8c;
            --ac: #ff4040;
            --gold: #ffd700;
            --err: #ff6464;
            --border: #505050;
            --separator: #333;
        }
        * { box-sizing: border-box; }
        html, body {
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            margin: 0;
            padding: 0;
            padding-top: env(safe-area-inset-top, 0);
            padding-bottom: env(safe-area-inset-bottom, 0);
            background: var(--bg);
            color: var(--fg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }
        #splash {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            color: var(--fg-dim);
            font-size: 14px;
            z-index: 1;
        }
        #splash[data-mounted] { display: none; }

        /* --- App-Layout --- */
        .app {
            max-width: 720px;
            margin: 0 auto;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .app-header { margin-bottom: 4px; }
        .app-title {
            font-size: 22px;
            font-weight: 600;
            margin: 0;
        }
        .app-subtitle {
            font-size: 12px;
            letter-spacing: 0.06em;
            color: var(--accent);
            margin: 4px 0 0;
        }
        .phase-note {
            font-size: 13px;
            color: var(--fg-dim);
            margin-top: 16px;
        }
        .phase-note code {
            background: var(--bg-elev);
            padding: 2px 6px;
            border-radius: 3px;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        }

        /* --- Display --- */
        .display {
            position: relative;
            background: var(--bg-display);
            border-radius: 8px;
            padding: 12px 14px 16px;
            min-height: 120px;
            display: flex;
            flex-direction: column;
        }
        .display-indicators {
            position: absolute;
            top: 8px;
            left: 12px;
            right: 12px;
            display: flex;
            justify-content: space-between;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 11px;
            color: var(--fg-dim);
            pointer-events: none;
        }
        .indicator-memory { color: var(--gold); font-weight: 600; }
        .indicator-mode-right { display: flex; gap: 8px; }
        .indicator-numeral { color: var(--accent); }

        .display-line {
            display: flex;
            align-items: center;
            min-height: 44px;
            margin-top: 16px;
            overflow: hidden;
        }
        .display-input { justify-content: flex-start; color: var(--fg-dim); }
        .display-result { justify-content: flex-end; color: var(--fg); }
        .display-separator {
            border-top: 1px solid var(--separator);
            margin: 4px 8px;
        }

        /* --- Token-Reihen im Display --- */
        .token-row {
            display: inline-flex;
            align-items: center;
            gap: 0;
        }
        .token-row-input { font-size: 14px; }
        .token-row-result { font-size: 22px; }

        /* --- Glyphen --- */
        .glyph {
            width: 1.2em;
            height: 1.2em;
            stroke: currentColor;
            fill: none;
            stroke-width: 6;
            stroke-linecap: round;
            stroke-linejoin: round;
            vertical-align: middle;
        }
        .token-row-result .glyph { width: 1.4em; height: 1.4em; }

        /* --- Punktuation/Operatoren als Text --- */
        .punct {
            display: inline-flex;
            align-items: center;
            padding: 0 0.1em;
            line-height: 1;
        }
        .punct.op { color: var(--accent); margin: 0 0.15em; }
        .punct.neg { color: var(--fg); }
        .punct.placeholder {
            color: var(--fg-faint);
            font-style: italic;
            font-size: 0.75em;
            padding: 0 0.3em;
        }

        /* --- State C: Periode mit Überstrich --- */
        .periodic {
            position: relative;
            display: inline-flex;
            align-items: center;
            border-top: 2px solid currentColor;
            padding-top: 2px;
            margin-top: -2px;
        }

        /* --- State C: drei Punkte auf Überstrich-Höhe --- */
        .ellipsis-raised {
            display: inline-block;
            transform: translateY(-0.55em);
            margin-left: 0.15em;
            font-size: 0.7em;
            letter-spacing: 0.05em;
            color: currentColor;
        }

        /* --- State B: ≈-Prefix --- */
        .approx-prefix {
            color: var(--fg-dim);
            margin-right: 0.3em;
            font-size: 0.85em;
        }

        /* --- Fehler --- */
        .error-text {
            color: var(--err);
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-weight: 600;
        }

        /* --- Keypad --- */
        .keypad {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .keypad-digits {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        .keypad-ops, .keypad-system {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        .keypad-separator {
            border-top: 1px solid var(--separator);
            margin: 2px 0;
        }

        /* --- Token-Button (alle Tasten) --- */
        .token-btn {
            min-height: 44px;
            padding: 8px 4px;
            background: var(--bg-elev);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--fg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 80ms, border-color 80ms;
            position: relative;
            -webkit-user-select: none;
            user-select: none;
        }
        .token-btn:active {
            background: rgba(255, 255, 255, 0.10);
        }

        /* --- Varianten --- */
        .token-btn-digit {
            color: var(--fg);
        }
        .token-btn-digit:active {
            color: var(--gold);
        }
        .token-btn-digit .glyph {
            width: 1.8em;
            height: 1.8em;
            stroke-width: 5;
        }
        .token-btn-op {
            color: var(--accent);
        }
        .token-btn-op:active {
            color: #ff9090; /* LIGHT_RED-Pendant */
        }
        .token-btn-nav {
            color: var(--accent);
            font-size: 14px;
        }
        .token-btn-sys {
            color: var(--fg);
            font-size: 13px;
        }
        .token-btn-ac {
            color: var(--ac);
            font-weight: 600;
        }
        .token-btn-ac:active {
            background: rgba(255, 64, 64, 0.15);
        }
        .token-btn-equals {
            color: var(--equals);
            font-weight: 600;
            font-size: 20px;
            min-height: 52px;
        }
        .token-btn-equals:active {
            background: rgba(140, 220, 140, 0.18);
        }

        /* --- Armed-Marker --- */
        .token-btn.armed::after {
            content: "";
            position: absolute;
            top: 4px;
            right: 6px;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--gold);
        }

        /* --- Composite-Tokens (x^y, log_n) --- */
        .tok.composite {
            display: inline-flex;
            align-items: baseline;
        }
        .tok-super {
            font-size: 0.7em;
            vertical-align: super;
            margin-left: 0.1em;
        }
        .tok-sub {
            font-size: 0.7em;
            vertical-align: sub;
            margin-left: 0.1em;
        }

        /* --- Overlay-Varianten --- */
        .token-btn-mem {
            color: var(--gold);
            font-size: 13px;
            font-weight: 500;
        }
        .token-btn-const {
            color: #c0d8ff;
            font-size: 16px;
        }
        .token-btn-fn {
            color: var(--accent);
            font-size: 13px;
        }
        .token-btn-mode {
            color: var(--fg-dim);
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.02em;
        }

        /* --- Panel-Swap (Main ↔ Overlay) --- */
        .panel {
            display: flex;
            flex-direction: column;
            gap: 10px;
            animation: panel-fade 160ms ease-out;
        }
        @keyframes panel-fade {
            from { opacity: 0; transform: translateY(4px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .panel-overlay .keypad-ops {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 6px;
            padding: 6px;
        }
        .panel-overlay .keypad-system {
            margin-top: -4px;
        }

        /* --- Info-Surface --- */
        .info-page {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            z-index: 10;
            overflow: hidden;
        }
        .info-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-bottom: 1px solid var(--separator);
            padding-top: max(12px, env(safe-area-inset-top, 0));
        }
        .info-back {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--accent);
            padding: 8px 12px;
            font-size: 14px;
            cursor: pointer;
        }
        .info-back:hover { background: var(--bg-elev); }
        .info-title {
            font-size: 17px;
            font-weight: 600;
            margin: 0;
            color: var(--fg);
        }

        .info-layout {
            flex: 1;
            display: grid;
            grid-template-columns: minmax(220px, 280px) 1fr;
            overflow: hidden;
        }
        .info-toc {
            border-right: 1px solid var(--separator);
            overflow-y: auto;
            padding: 16px 0;
            background: rgba(0, 0, 0, 0.2);
        }
        .info-toc-list {
            list-style: none;
            margin: 0;
            padding: 0;
            counter-reset: chapter;
        }
        .info-toc-list li { margin: 0; }
        .info-toc-link {
            display: flex;
            align-items: baseline;
            gap: 10px;
            padding: 8px 16px;
            color: var(--fg);
            text-decoration: none;
            font-size: 14px;
            line-height: 1.35;
            border-left: 3px solid transparent;
            transition: background 80ms;
        }
        .info-toc-link:hover {
            background: var(--bg-elev);
            border-left-color: var(--accent);
        }
        .info-toc-num {
            color: var(--fg-dim);
            font-variant-numeric: tabular-nums;
            font-size: 12px;
            min-width: 1.6em;
            text-align: right;
        }
        .info-toc-title { flex: 1; }

        .info-body {
            overflow-y: auto;
            padding: 24px 32px max(60px, env(safe-area-inset-bottom, 60px));
            max-width: 760px;
            line-height: 1.7;
            font-size: 16px;
            color: var(--fg);
        }
        .info-chapter {
            margin-bottom: 48px;
            scroll-margin-top: 24px;
        }
        .info-chapter-title {
            margin: 0 0 8px;
            font-size: 22px;
            font-weight: 600;
        }
        .info-chapter-num {
            display: block;
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--accent);
            margin-bottom: 2px;
        }
        .info-chapter-name {
            display: block;
            color: var(--fg);
        }
        .info-chapter-teaser {
            color: var(--fg);
            margin: 8px 0;
        }
        .info-chapter-stub {
            color: var(--fg-dim);
            font-size: 14px;
        }
        .info-end {
            margin-top: 64px;
            padding: 16px;
            background: var(--bg-elev);
            border-radius: 6px;
            color: var(--fg-dim);
            font-size: 14px;
        }
        .info-end code {
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 5px;
            border-radius: 3px;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 13px;
            color: var(--accent);
        }

        /* Mobile: TOC oben als horizontaler Streifen statt Seitenleiste. */
        @media (max-width: 640px) {
            .info-layout {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr;
            }
            .info-toc {
                border-right: none;
                border-bottom: 1px solid var(--separator);
                max-height: 35vh;
                padding: 8px 0;
            }
            .info-body {
                padding: 16px 16px max(60px, env(safe-area-inset-bottom, 60px));
                font-size: 15px;
            }
            .info-chapter-title { font-size: 20px; }
        }
    </style>
</head>
<body>
    <div id="splash">Lade Dozenal Calc&hellip;</div>
</body>
</html>
