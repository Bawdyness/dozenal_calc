<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8" />
    <title>Dozenal Calc</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1a1a" />
    <meta name="description" content="Wissenschafts-Taschenrechner mit nativer Basis-12-Arithmetik und eigenen Ziffer-Glyphen." />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <link data-trunk rel="rust" href="Cargo.toml" />
    <link data-trunk rel="copy-file" href="manifest.webmanifest" />
    <link data-trunk rel="copy-file" href="icon.svg" />
    <link data-trunk rel="copy-file" href="sw.js" />
    <style>
        :root {
            /* Design-Tokens — Hintergrund deutlich dunkler als das alte
               Flutter-Grau, damit die Glyphen-Strokes mehr Kontrast haben. */
            --bg: #0e0e0e;
            --bg-display: rgba(0, 0, 0, 0.7);
            --bg-elev: rgba(255, 255, 255, 0.04);
            --fg: #f0f0f0;
            --fg-dim: #a8a8a8;
            --fg-faint: #555;
            /* Token-Farben (Flutter _k*-Konstanten) */
            --digit-normal: #ffffff;        /* _kDigitNormal */
            --digit-pressed: #ffd700;       /* _kDigitPressed */
            --digit-disabled: #606060;      /* _kDigitDisabled */
            --op-normal: #98c8ff;           /* _kOpNormal */
            --op-pressed: #ff9090;          /* _kOpPressed */
            --equals: #8cdc8c;              /* _kEquals */
            --ac: #ff4040;                  /* _kAc */
            --ac-pressed: #ff8080;          /* _kAcPressed */
            --border: #505050;              /* _kBorder */
            --border-disabled: #303030;
            /* Spezialfarben */
            --accent: var(--op-normal);
            --gold: var(--digit-pressed);
            --err: #ff6464;
            --separator: #2a2a2a;
        }
        * { box-sizing: border-box; }
        html, body {
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            margin: 0;
            padding: 0;
            padding-top: env(safe-area-inset-top, 0);
            padding-bottom: env(safe-area-inset-bottom, 0);
            background: var(--bg);
            color: var(--fg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }
        #splash {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            color: var(--fg-dim);
            font-size: 14px;
            z-index: 1;
        }
        #splash[data-mounted] { display: none; }

        /* --- App-Layout --- */
        .app {
            max-width: 720px;
            margin: 0 auto;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .app-header { margin-bottom: 4px; }
        .app-title {
            font-size: 22px;
            font-weight: 600;
            margin: 0;
        }
        .app-subtitle {
            font-size: 12px;
            letter-spacing: 0.06em;
            color: var(--accent);
            margin: 4px 0 0;
        }
        .phase-note {
            font-size: 13px;
            color: var(--fg-dim);
            margin-top: 16px;
        }
        .phase-note code {
            background: var(--bg-elev);
            padding: 2px 6px;
            border-radius: 3px;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        }

        /* --- Display ---
           Flutter-typografische Hierarchie: Indikatoren klein und dim,
           Eingabe-Zeile mittelgross dim, Resultat-Zeile gross und vollfarbig. */
        .display {
            position: relative;
            background: var(--bg-display);
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 14px 16px 16px;
            min-height: 128px;
            display: flex;
            flex-direction: column;
        }
        .display-indicators {
            position: absolute;
            top: 6px;
            left: 12px;
            right: 12px;
            display: flex;
            justify-content: space-between;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 10px;
            letter-spacing: 0.06em;
            color: var(--fg-dim);
            pointer-events: none;
            text-transform: uppercase;
        }
        .indicator-memory {
            color: var(--digit-pressed);
            font-weight: 600;
            min-width: 1em;
        }
        .indicator-mode-right { display: flex; gap: 10px; }
        .indicator-numeral { color: var(--op-normal); }

        .display-line {
            display: flex;
            align-items: center;
            min-height: 48px;
            margin-top: 18px;
            padding: 6px 0;                 /* Raum für Stroke-Überstand */
            overflow-x: hidden;             /* lange Ausdrücke horizontal kappen */
            overflow-y: visible;            /* aber Glyphen-Stroke darf vertikal raus */
        }
        /* Eingabe-Zeile hell und gut lesbar — kein dim mehr.
           Resultat-Zeile etwas heller noch (volles Weiss). */
        /* Beide Zeilen in voller Helligkeit; Hierarchie über Schriftgrösse. */
        .display-input { justify-content: flex-start; color: var(--fg); }
        .display-result { justify-content: flex-end; color: var(--digit-normal); }
        .display-separator {
            border-top: 0.5px solid var(--separator);
            margin: 6px 10px 4px;
        }

        /* --- Token-Reihen im Display --- */
        .token-row {
            display: inline-flex;
            align-items: center;
            gap: 0.1em;
        }
        /* Eingabe in fast voller Helligkeit, nur klein — der Unterschied
           zum Resultat soll Grösse sein, nicht Helligkeit. */
        .token-row-input { font-size: 20px; font-weight: 500; color: var(--fg); }
        .token-row-input .glyph { width: 1.4em; height: 1.4em; }
        .token-row-result { font-size: 34px; font-weight: 600; }
        .token-row-result .glyph { width: 1.55em; height: 1.55em; }

        /* --- Glyphen ---
           Strichstärke in absoluten Pixeln (vector-effect: non-scaling-stroke),
           damit die Linienstärke vom Display (gross) bis zur Taste (mittel)
           bis zum Mini-Indikator (klein) optisch konsistent bleibt. Flutter
           `paintDozenalDigitAt` zeichnet ebenfalls absolut, nur die Stärke
           selbst ist hier höher als der 2.5-Default in Flutter, weil das
           Web-Rendering bei diesen Pixelgrössen mehr Anti-Aliasing-Glättung
           gegen die Linie schluckt. */
        .glyph {
            width: 1.2em;
            height: 1.2em;
            stroke: currentColor;
            fill: none;
            stroke-width: 6;
            stroke-linecap: round;
            stroke-linejoin: round;
            vertical-align: middle;
            color: currentColor;
            /* `overflow: visible` verhindert das Beschneiden der Strokes an den
               viewBox-Kanten — sonst sehen Vollkreise oben/unten wie gerade
               abgeschnittene Linien aus, weil die Strokebreite über y=0/y=100
               hinausragt. */
            overflow: visible;
        }
        .glyph, .glyph * { vector-effect: non-scaling-stroke; }
        /* Display-Glyphen (Resultat) noch eine Spur grösser. */
        .token-row-result .glyph { width: 1.55em; height: 1.55em; }

        /* --- Punktuation/Operatoren als Text --- */
        .punct {
            display: inline-flex;
            align-items: center;
            padding: 0 0.1em;
            line-height: 1;
        }
        .punct.op { color: var(--accent); margin: 0 0.15em; }
        .punct.neg { color: var(--fg); }
        .punct.placeholder {
            color: var(--fg-faint);
            font-style: italic;
            font-size: 0.75em;
            padding: 0 0.3em;
        }

        /* --- State C: Periode mit Überstrich --- */
        .periodic {
            position: relative;
            display: inline-flex;
            align-items: center;
            border-top: 2px solid currentColor;
            padding-top: 2px;
            margin-top: -2px;
        }

        /* --- State C: drei Punkte auf Überstrich-Höhe --- */
        .ellipsis-raised {
            display: inline-block;
            transform: translateY(-0.55em);
            margin-left: 0.15em;
            font-size: 0.7em;
            letter-spacing: 0.05em;
            color: currentColor;
        }

        /* --- State B: ≈-Prefix --- */
        .approx-prefix {
            color: var(--fg-dim);
            margin-right: 0.3em;
            font-size: 0.85em;
        }

        /* --- Dezimal-Ansicht: schlichte Text-Ziffern statt Doz-Glyphen.
              Bewusst monospace, damit die Periode-Stellen visuell sauber
              unter Vor- und Nachperiode liegen. --- */
        .dec-digit,
        .dec-number {
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-weight: 500;
            font-size: 1.1em;
            letter-spacing: 0.02em;
        }

        /* --- Fehler --- */
        .error-text {
            color: var(--err);
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-weight: 600;
        }

        /* --- Keypad --- */
        .keypad {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .keypad-digits {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        .keypad-ops, .keypad-system {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        .keypad-separator {
            border-top: 1px solid var(--separator);
            margin: 2px 0;
        }

        /* --- Token-Button (alle Tasten) ---
           Flutter `_PressableShell`-Spec: transparenter Hintergrund, 1 px
           Border in --border, 4 px Radius. Kein Fill — die Form lebt nur
           vom Border und der inneren Glyphe/Schrift. Press-Feedback ändert
           nur die Glyph-/Text-Farbe (Flutter nutzt `NoSplash.splashFactory`,
           also kein Hintergrund-Ripple). */
        .token-btn {
            min-height: 48px;
            padding: 6px 4px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--digit-normal);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 14px;
            font-weight: 700;          /* aggressivere Präsenz */
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 80ms, border-color 80ms;
            position: relative;
            -webkit-user-select: none;
            user-select: none;
            line-height: 1;
            overflow: visible;          /* SVG-Strokes nicht beschneiden */
        }
        /* Subtiler Desktop-Hover (auf Touch-Devices irrelevant). */
        @media (hover: hover) {
            .token-btn:hover { border-color: #6a6a6a; }
        }
        /* :active = nur Glyph-Farbe wechseln, nicht der Hintergrund. */
        .token-btn:active {
            transition: none;
        }
        .token-btn[disabled],
        .token-btn[aria-disabled="true"] {
            border-color: var(--border-disabled);
            color: var(--digit-disabled);
            cursor: not-allowed;
        }

        /* --- Varianten — Glyph-/Text-Farben je Kontext --- */
        .token-btn-digit { color: var(--digit-normal); }
        .token-btn-digit:active { color: var(--digit-pressed); }
        .token-btn-digit .glyph {
            width: 2.7em;
            height: 2.7em;
        }

        .token-btn-op { color: var(--op-normal); }
        .token-btn-op:active { color: var(--op-pressed); }
        .token-btn-op .glyph {
            width: 2.4em;
            height: 2.4em;
        }

        .token-btn-nav {
            color: var(--op-normal);
            font-size: 14px;
        }
        .token-btn-nav:active { color: var(--op-pressed); }
        .token-btn-nav .glyph {
            width: 2em;
            height: 2em;
        }

        .token-btn-sys {
            color: var(--digit-normal);
            font-size: 18px;
        }
        .token-btn-sys:active { color: var(--op-pressed); }

        .token-btn-mem {
            color: var(--digit-pressed);
            font-size: 16px;
            font-weight: 700;
        }
        .token-btn-mem:active { color: var(--op-pressed); }

        .token-btn-const {
            color: var(--op-normal);
            font-size: 20px;
        }
        .token-btn-const:active { color: var(--op-pressed); }

        .token-btn-fn {
            color: var(--op-normal);
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 20px;
            font-weight: 700;
        }
        .token-btn-fn:active { color: var(--op-pressed); }

        .token-btn-mode {
            color: var(--fg-dim);
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.02em;
        }
        .token-btn-mode:active { color: var(--op-pressed); }

        .token-btn-ac {
            color: var(--ac);
            font-weight: 800;
            font-size: 16px;
        }
        .token-btn-ac:active { color: var(--ac-pressed); }

        .token-btn-equals {
            color: var(--equals);
            font-weight: 800;
            font-size: 24px;
            min-height: 56px;
        }
        .token-btn-equals:active { color: var(--op-pressed); }

        /* --- Cursor im Display ---
           Roter Strich zwischen Token-Positionen; blinkt im 1-s-Takt.
           Wird in display.rs zwischen Token-Children eingefügt. */
        .cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: var(--ac);
            margin: 0 1px;
            vertical-align: middle;
            animation: cursor-blink 1s steps(2, start) infinite;
        }
        @keyframes cursor-blink {
            50% { opacity: 0; }
        }
        /* Reduced-motion respektieren — kein Blinken. */
        @media (prefers-reduced-motion: reduce) {
            .cursor { animation: none; opacity: 1; }
        }

        /* --- Armed-Marker (Flutter `_ArmedDot`, top: 4, right: 4) --- */
        .token-btn.armed::after {
            content: "";
            position: absolute;
            top: 4px;
            right: 4px;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--digit-pressed);
        }

        /* --- Selected-Marker (Mode-Tasten DRG/DOZ/DEZ wenn aktiv) ---
           Flutter: 2px-Border in _kOpNormal, wenn `selected`. */
        .token-btn.selected {
            border-color: var(--op-normal);
            border-width: 2px;
            padding: 5px 3px;    /* 1px weniger Padding, damit kein Layout-Shift */
        }

        /* --- Composite-Tokens (x^y, log_n) --- */
        .tok.composite {
            display: inline-flex;
            align-items: baseline;
        }
        .tok-super {
            font-size: 0.7em;
            vertical-align: super;
            margin-left: 0.1em;
        }
        .tok-sub {
            font-size: 0.7em;
            vertical-align: sub;
            margin-left: 0.1em;
        }

        /* --- Panel-Swap (Main ↔ Overlay) --- */
        .panel {
            display: flex;
            flex-direction: column;
            gap: 10px;
            animation: panel-fade 160ms ease-out;
        }
        @keyframes panel-fade {
            from { opacity: 0; transform: translateY(4px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .panel-overlay .keypad-ops {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 6px;
            padding: 6px;
        }
        .panel-overlay .keypad-system {
            margin-top: -4px;
        }

        /* --- Info-Surface --- */
        .info-page {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            z-index: 10;
            overflow: hidden;
        }
        .info-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-bottom: 1px solid var(--separator);
            padding-top: max(12px, env(safe-area-inset-top, 0));
        }
        .info-back {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--accent);
            padding: 8px 12px;
            font-size: 14px;
            cursor: pointer;
        }
        .info-back:hover { background: var(--bg-elev); }
        .info-title {
            font-size: 17px;
            font-weight: 600;
            margin: 0;
            color: var(--fg);
        }

        .info-layout {
            flex: 1;
            display: grid;
            grid-template-columns: minmax(220px, 280px) 1fr;
            overflow: hidden;
        }
        .info-toc {
            border-right: 1px solid var(--separator);
            overflow-y: auto;
            padding: 16px 0;
            background: rgba(0, 0, 0, 0.2);
        }
        .info-toc-list {
            list-style: none;
            margin: 0;
            padding: 0;
            counter-reset: chapter;
        }
        .info-toc-list li { margin: 0; }
        .info-toc-link {
            display: flex;
            align-items: baseline;
            gap: 10px;
            padding: 8px 16px;
            color: var(--fg);
            text-decoration: none;
            font-size: 14px;
            line-height: 1.35;
            border-left: 3px solid transparent;
            transition: background 80ms;
        }
        .info-toc-link:hover {
            background: var(--bg-elev);
            border-left-color: var(--accent);
        }
        .info-toc-num {
            color: var(--fg-dim);
            font-variant-numeric: tabular-nums;
            font-size: 12px;
            min-width: 1.6em;
            text-align: right;
        }
        .info-toc-title { flex: 1; }

        .info-body {
            overflow-y: auto;
            padding: 24px 32px max(60px, env(safe-area-inset-bottom, 60px));
            max-width: 760px;
            line-height: 1.7;
            font-size: 16px;
            color: var(--fg);
        }
        .info-chapter {
            margin-bottom: 48px;
            scroll-margin-top: 24px;
        }
        .info-chapter-title {
            margin: 0 0 8px;
            font-size: 22px;
            font-weight: 600;
        }
        .info-chapter-num {
            display: block;
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--accent);
            margin-bottom: 2px;
        }
        .info-chapter-name {
            display: block;
            color: var(--fg);
        }
        .info-chapter-teaser {
            color: var(--fg);
            margin: 8px 0;
        }
        .info-chapter-stub {
            color: var(--fg-dim);
            font-size: 14px;
        }
        .info-end {
            margin-top: 64px;
            padding: 16px;
            background: var(--bg-elev);
            border-radius: 6px;
            color: var(--fg-dim);
            font-size: 14px;
        }
        .info-end code {
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 5px;
            border-radius: 3px;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 13px;
            color: var(--accent);
        }

        /* Mobile: TOC oben als horizontaler Streifen statt Seitenleiste. */
        @media (max-width: 640px) {
            .info-layout {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr;
            }
            .info-toc {
                border-right: none;
                border-bottom: 1px solid var(--separator);
                max-height: 35vh;
                padding: 8px 0;
            }
            .info-body {
                padding: 16px 16px max(60px, env(safe-area-inset-bottom, 60px));
                font-size: 15px;
            }
            .info-chapter-title { font-size: 20px; }
        }
    </style>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function () {
                navigator.serviceWorker.register('./sw.js').catch(function () {});
            });
        }
    </script>
</head>
<body>
    <div id="splash" aria-live="polite">
        <svg viewBox="0 0 96 96" width="64" height="64" aria-hidden="true" focusable="false">
            <circle cx="48" cy="32" r="20" stroke="#98c8ff" stroke-width="5" fill="none">
                <animate attributeName="opacity" values="0.3;1;0.3" dur="1.6s" repeatCount="indefinite"/>
            </circle>
            <circle cx="48" cy="64" r="20" stroke="#98c8ff" stroke-width="5" fill="none">
                <animate attributeName="opacity" values="1;0.3;1" dur="1.6s" repeatCount="indefinite"/>
            </circle>
        </svg>
    </div>
</body>
</html>
